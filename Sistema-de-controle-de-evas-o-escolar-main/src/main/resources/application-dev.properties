# Banco H2 (desenvolvimento local)
spring.datasource.url=jdbc:h2:mem:evasaoescolar;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Console H2 (acessível em http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Segurança (valores dummy para dev)
app.security.pepper=dev-pepper-12345678901234567890123456789012
app.security.jwt-secret=dev-jwt-secret-12345678901234567890123456789012
app.security.cookie-secure=false

# Porta
server.port=8080