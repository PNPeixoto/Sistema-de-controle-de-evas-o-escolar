spring.application.name=usuario

# Banco de dados — configure com os dados da sua VPS Hostinger
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/db_usuario}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:1234}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Segurança
app.security.pepper=${APP_PEPPER:pX7#vM2$kL9@qR4*zT1^nW8!cJ5&bF0_yH3+gD6-sX9=kV2~pM5>cL8<tR1?nE4}
app.security.jwt-secret=${JWT_SECRET:4f7a92b1c3e5d7f9a2b4c6e8d0f1a3b5c7e9d1f2a4b6c8d0e2f4a6b8c0d2e4f6}

# PRODUÇÃO (HTTPS na Hostinger) = true
app.security.cookie-secure=true

# Porta do servidor (default 8080, altere se necessário)
server.port=${PORT:8080}
