spring.application.name=usuario

# Banco de dados
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JPA
# ddl-auto is profile-specific: dev/test use local schemas; prod validates only.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Segurança
app.security.pepper=${APP_PEPPER}
app.security.jwt-secret=${JWT_SECRET}
app.security.trust-forwarded-headers=false
app.security.state-store=${APP_SECURITY_STATE_STORE:in-memory}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:}

# PRODUÇÃO (HTTPS na Hostinger) = true
app.security.cookie-secure=true

# Porta do servidor (default 8080, altere se necessário)
server.port=${PORT:8080}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers
management.endpoint.health.show-details=when_authorized
management.endpoint.health.show-components=always
management.metrics.tags.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true

# Info do app
info.app.name=@project.name@
info.app.version=@project.version@
info.app.description=@project.description@
