spring.application.name=usuario

# Banco de dados — configure com os dados da sua VPS Hostinger
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Segurança
app.security.pepper=${APP_PEPPER}
app.security.jwt-secret=${JWT_SECRET}

# PRODUÇÃO (HTTPS na Hostinger) = true
app.security.cookie-secure=true

# Porta do servidor (default 8080, altere se necessário)
server.port=${PORT:8080}
