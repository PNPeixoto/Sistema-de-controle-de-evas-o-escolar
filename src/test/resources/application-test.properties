spring.datasource.url=jdbc:h2:mem:prefeitura_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.security.pepper=test-pepper
app.security.jwt-secret=0123456789012345678901234567890123456789012345678901234567890123
app.security.cookie-secure=false
app.security.state-store=in-memory
app.cors.allowed-origins=http://localhost:5173,https://allowed.example.test
